<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hitomi Gallery Downloader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .log-entry { font-family: 'Consolas', monospace; font-size: 0.875rem; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">
  <div class="w-full max-w-3xl">
    <h1 class="text-3xl md:text-4xl font-bold text-center mb-2 gradient-text">Hitomi Gallery Downloader</h1>
    <p class="text-center text-gray-400 mb-8">Download images from a gallery as a ZIP file</p>

    <!-- URL Input -->
    <div class="glass rounded-xl p-6 mb-6">
      <label class="block text-sm font-medium mb-2">Gallery URL</label>
      <div class="flex flex-col sm:flex-row gap-3">
        <input type="url" id="galleryUrl" placeholder="https://hitomi.la/imageset/...-english-123456.html" 
               class="flex-1 bg-white/10 border border-white/20 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500">
        <button id="fetchInfoBtn" class="bg-purple-600 hover:bg-purple-700 text-white font-medium px-6 py-2.5 rounded-lg transition flex items-center justify-center gap-2">
          <i class="fas fa-search"></i> Get Info
        </button>
      </div>
    </div>

    <!-- Gallery Info (hidden initially) -->
    <div id="infoSection" class="glass rounded-xl p-6 mb-6 hidden">
      <div class="flex flex-wrap justify-between items-start gap-4">
        <div>
          <h2 id="galleryTitle" class="text-xl font-semibold"></h2>
          <p class="text-gray-400 mt-1"><span id="imageCount"></span> images</p>
          <div id="formatTags" class="flex gap-2 mt-2"></div>
        </div>
        <div class="text-right">
          <p class="text-sm text-gray-400">Estimated ZIP size</p>
          <p id="sizeEstimate" class="text-lg font-bold text-purple-400"></p>
        </div>
      </div>

      <!-- Download controls -->
      <div class="mt-6 flex flex-wrap items-end gap-4">
        <div>
          <label class="block text-sm mb-1">Number of images</label>
          <input type="number" id="imageCountInput" min="1" class="bg-white/10 border border-white/20 rounded-lg px-3 py-2 text-white w-24 focus:outline-none focus:ring-2 focus:ring-purple-500">
        </div>
        <button id="downloadBtn" class="bg-purple-600 hover:bg-purple-700 disabled:opacity-50 text-white font-medium px-6 py-2.5 rounded-lg transition flex items-center gap-2">
          <i class="fas fa-download"></i> Download ZIP
        </button>
        <button id="cancelBtn" class="bg-red-600/30 hover:bg-red-600/50 text-red-300 px-4 py-2.5 rounded-lg hidden">
          <i class="fas fa-times"></i> Cancel
        </button>
      </div>

      <!-- Progress -->
      <div id="progressSection" class="mt-4 hidden">
        <div class="flex justify-between text-sm mb-1">
          <span id="progressText">0%</span>
          <span id="progressCount">0 / 0</span>
        </div>
        <div class="w-full bg-white/10 rounded-full h-2">
          <div id="progressBar" class="bg-purple-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
      </div>
    </div>

    <!-- Log Display -->
    <div class="glass rounded-xl p-6">
      <h3 class="text-lg font-semibold mb-3 flex items-center gap-2"><i class="fas fa-terminal"></i> Logs</h3>
      <div id="logContainer" class="bg-black/40 rounded-lg p-3 h-64 overflow-y-auto font-mono text-sm space-y-1">
        <div class="text-gray-500">Waiting for actions...</div>
      </div>
    </div>
  </div>

  <script>
    const urlInput = document.getElementById('galleryUrl');
    const fetchBtn = document.getElementById('fetchInfoBtn');
    const infoSection = document.getElementById('infoSection');
    const galleryTitle = document.getElementById('galleryTitle');
    const imageCount = document.getElementById('imageCount');
    const formatTags = document.getElementById('formatTags');
    const sizeEstimate = document.getElementById('sizeEstimate');
    const imageCountInput = document.getElementById('imageCountInput');
    const downloadBtn = document.getElementById('downloadBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const progressSection = document.getElementById('progressSection');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const progressCount = document.getElementById('progressCount');
    const logContainer = document.getElementById('logContainer');

    let currentInfo = null;
    let abortController = null;
    let eventSource = null;

    function connectSSE() {
      if (eventSource) eventSource.close();
      eventSource = new EventSource('/api/logs');
      eventSource.addEventListener('log', (e) => {
        try {
          const data = JSON.parse(e.data);
          appendLog(data.timestamp, data.level, data.message);
        } catch (err) {
          console.error('SSE parse error:', err);
        }
      });
      eventSource.addEventListener('progress', (e) => {
        try {
          const { current, total, percent } = JSON.parse(e.data);
          updateProgress(current, total, percent);
        } catch (err) {
          console.error('Progress parse error:', err);
        }
      });
      eventSource.addEventListener('complete', () => {
        resetUI();
        appendLog(null, 'info', 'Download complete!');
      });
      eventSource.onerror = () => {
        eventSource.close();
        setTimeout(connectSSE, 3000);
      };
    }
    connectSSE();

    function appendLog(timestamp, level, message) {
      const timeStr = timestamp ? new Date(timestamp).toLocaleTimeString() : '';
      const colorMap = { info: 'text-blue-400', warn: 'text-yellow-400', error: 'text-red-400' };
      const levelColor = colorMap[level] || 'text-gray-400';
      const entry = document.createElement('div');
      entry.className = 'log-entry flex gap-2';
      entry.innerHTML = `<span class="text-gray-500">${timeStr}</span><span class="${levelColor}">[${level.toUpperCase()}]</span><span>${message}</span>`;
      logContainer.appendChild(entry);
      logContainer.scrollTop = logContainer.scrollHeight;
    }

    function updateProgress(current, total, percent) {
      progressSection.classList.remove('hidden');
      progressBar.style.width = percent + '%';
      progressText.textContent = percent + '%';
      progressCount.textContent = `${current} / ${total}`;
    }

    function resetUI() {
      downloadBtn.disabled = false;
      cancelBtn.classList.add('hidden');
      progressSection.classList.add('hidden');
      abortController = null;
    }

    // FIXED: Get Info button with proper error handling
    fetchBtn.addEventListener('click', async () => {
      const url = urlInput.value.trim();
      if (!url) {
        alert('Please enter a gallery URL');
        return;
      }
      
      fetchBtn.disabled = true;
      fetchBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
      
      try {
        const res = await fetch('/api/gallery/info', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        // Check if response is OK
        if (!res.ok) {
          const text = await res.text();
          console.error('Server error response:', text);
          throw new Error(`Server error (${res.status}): ${text.substring(0, 100)}`);
        }

        // Check if response is JSON
        const contentType = res.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
          const text = await res.text();
          console.error('Expected JSON but got:', text.substring(0, 200));
          throw new Error('Server returned non-JSON response. Check server logs.');
        }

        const data = await res.json();
        if (data.error) throw new Error(data.error);
        
        currentInfo = data;
        displayInfo(data);
        appendLog(null, 'info', `Loaded gallery: ${data.title}`);
      } catch (err) {
        console.error('Fetch error:', err);
        appendLog(null, 'error', err.message);
        alert('Error: ' + err.message);
      } finally {
        fetchBtn.disabled = false;
        fetchBtn.innerHTML = '<i class="fas fa-search"></i> Get Info';
      }
    });

    function displayInfo(info) {
      galleryTitle.textContent = info.title;
      imageCount.textContent = info.total;
      sizeEstimate.textContent = info.sizeEstimate;
      formatTags.innerHTML = info.formats.map(f => `<span class="text-xs bg-purple-500/20 text-purple-300 px-2 py-0.5 rounded-full">${f.toUpperCase()}</span>`).join('');
      imageCountInput.max = info.total;
      imageCountInput.value = Math.min(info.total, 50);
      infoSection.classList.remove('hidden');
      progressSection.classList.add('hidden');
    }

    // FIXED: Download button with proper error handling
    downloadBtn.addEventListener('click', async () => {
      if (!currentInfo) {
        alert('Please get gallery info first');
        return;
      }
      
      const count = parseInt(imageCountInput.value, 10);
      if (isNaN(count) || count < 1 || count > currentInfo.total) {
        alert('Invalid image count');
        return;
      }
      
      downloadBtn.disabled = true;
      cancelBtn.classList.remove('hidden');
      abortController = new AbortController();

      try {
        const res = await fetch('/api/gallery/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: urlInput.value.trim(), count }),
          signal: abortController.signal,
        });

        // Check if response is OK
        if (!res.ok) {
          const text = await res.text();
          try {
            const err = JSON.parse(text);
            throw new Error(err.error || 'Download failed');
          } catch {
            throw new Error(`Download failed (${res.status}): ${text.substring(0, 100)}`);
          }
        }

        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = (currentInfo.title.replace(/[\\/:*?"<>|]/g, '_') + '.zip');
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
        appendLog(null, 'info', 'Download finished');
      } catch (err) {
        if (err.name === 'AbortError') {
          appendLog(null, 'warn', 'Download cancelled');
        } else {
          appendLog(null, 'error', err.message);
          alert('Error: ' + err.message);
        }
      } finally {
        resetUI();
      }
    });

    cancelBtn.addEventListener('click', () => {
      if (abortController) {
        abortController.abort();
        appendLog(null, 'warn', 'Cancelling download...');
      }
      resetUI();
    });
  </script>
</body>
  </html>
